<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produtos | Loja de Variedades</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark"><img class="logo-img" src="imgs/logo.jpeg" alt="LojaVar" />LojaVariedade</div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="dashboard.html">Dashboard</a>
      <a class="nav-item" href="pdv.html">PDV — Caixa</a>
      <a class="nav-item active" href="produtos.html">Produtos</a>
      <a class="nav-item" href="categorias.html">Categorias</a>
      <a class="nav-item" href="clientes.html">Clientes</a>
      <a class="nav-item" href="vendas.html">Vendas</a>
      <a class="nav-item" href="estoque.html">Estoque Crítico</a>
    </nav>
  </aside>

  <main class="main">
    <header class="topbar">
      <span class="topbar-title">Produtos</span>
      <div class="topbar-spacer"></div>
      <span class="topbar-time" id="clock"></span>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div>
          <h1>Produtos</h1>
          <p style="color:var(--text-muted);font-size:13px;margin-top:4px;">Gerencie seu catálogo de produtos</p>
        </div>
        <button class="btn btn-primary" onclick="openModal('modalProduto')">+ Novo Produto</button>
      </div>

      <div class="card">
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Buscar por nome..." oninput="loadProdutos()" class="flex-1" />
          <select id="catFilter" onchange="loadProdutos()" style="width:180px">
            <option value="">Todas categorias</option>
          </select>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Produto</th>
                <th>Categoria</th>
                <th>Preço</th>
                <th>Estoque</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="produtosTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast-container" id="toastContainer"></div>

<div class="modal-overlay" id="modalProduto">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalProdutoTitle">Novo Produto</span>
      <button class="modal-close" onclick="closeModal('modalProduto')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="prodId" />
      <div class="form-grid">
        <div class="form-group full">
          <label>Nome do Produto *</label>
          <input type="text" id="prodNome" placeholder="Nome do produto" />
        </div>
        <div class="form-group">
          <label>Categoria</label>
          <select id="prodCategoria"><option value="">Selecione...</option></select>
        </div>
        <div class="form-group">
          <label>Preço (R$) *</label>
          <input type="number" id="prodPreco" step="0.01" min="0" placeholder="0,00" />
        </div>
        <div class="form-group">
          <label>Qtde. em Estoque</label>
          <input type="number" id="prodEstoque" min="0" placeholder="0" />
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modalProduto');resetForm()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarProduto()">Salvar</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
let categorias = [];

async function init() {
  categorias = await api.get('categorias.php');
  const sel = document.getElementById('catFilter');
  const selModal = document.getElementById('prodCategoria');
  categorias.forEach(c => {
    sel.innerHTML += `<option value="${c.id_categoria}">${c.nome}</option>`;
    selModal.innerHTML += `<option value="${c.id_categoria}">${c.nome}</option>`;
  });
  loadProdutos();
}

async function loadProdutos() {
  const tbody = document.getElementById('produtosTable');
  loadingRows(tbody, 6);

  const q = document.getElementById('searchInput').value;
  const cat = document.getElementById('catFilter').value;

  let url = 'produtos.php?1=1';
  if (q) url += `&busca=${encodeURIComponent(q)}`;
  if (cat) url += `&categoria=${cat}`;

  try {
    const produtos = await api.get(url);
    if (produtos.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center p-40 text-sub">Nenhum produto encontrado</td></tr>';
      return;
    }
    tbody.innerHTML = produtos.map(p => {
      const semEstoque = p.qtde_estoque === 0;
      const baixo = p.qtde_estoque <= 5 && !semEstoque;
      const badge = semEstoque ? '<span class="badge badge-danger">Sem estoque</span>'
        : baixo ? '<span class="badge badge-warning">Estoque baixo</span>'
        : '<span class="badge badge-success">OK</span>';
      return `
        <tr>
          <td class="mono">${p.id_produto}</td>
          <td class="fw-700">${p.nome}</td>
          <td><span class="badge badge-info">${p.categoria_nome || '—'}</span></td>
          <td class="mono text-accent">${formatCurrency(p.preco)}</td>
          <td>
            <span class="mono fw-700">${p.qtde_estoque}</span>
            ${badge}
          </td>
          <td>
            <div class="flex gap-6">
              <button class="btn btn-sm btn-outline" onclick='editProduto(${JSON.stringify(JSON.stringify(p))})'>Editar</button>
              <button class="btn btn-sm btn-danger" onclick="removerProduto(${p.id_produto},'${p.nome.replace("'","")}')">Remover</button>
            </div>
          </td>
        </tr>`;
    }).join('');
  } catch (e) {
    toast('Erro ao carregar produtos', 'error');
  }
}

function editProduto(pJson) {
  const p = JSON.parse(pJson);
  document.getElementById('prodId').value = p.id_produto;
  document.getElementById('prodNome').value = p.nome;
  document.getElementById('prodCategoria').value = p.id_categoria;
  document.getElementById('prodPreco').value = p.preco;
  document.getElementById('prodEstoque').value = p.qtde_estoque;
  document.getElementById('modalProdutoTitle').textContent = `Editar: ${p.nome}`;
  openModal('modalProduto');
}

async function salvarProduto() {
  const id = document.getElementById('prodId').value;
  const data = {
    nome: document.getElementById('prodNome').value,
    id_categoria: document.getElementById('prodCategoria').value || null,
    preco: parseFloat(document.getElementById('prodPreco').value) || 0,
    qtde_estoque: parseInt(document.getElementById('prodEstoque').value) || 0
  };

  if (!data.nome) { toast('Nome é obrigatório', 'warning'); return; }

  try {
    if (id) {
      await api.put(`produtos.php?id=${id}`, data);
      toast('Produto atualizado!', 'success');
    } else {
      await api.post('produtos.php', data);
      toast('Produto criado!', 'success');
    }
    closeModal('modalProduto');
    resetForm();
    loadProdutos();
  } catch (e) {
    toast('Erro: ' + e.message, 'error');
  }
}

function removerProduto(id, nome) {
  confirmDelete(`Remover produto "${nome}"?`, async () => {
    try {
      await api.delete(`produtos.php?id=${id}`);
      toast('Produto removido', 'success');
      loadProdutos();
    } catch (e) {
      toast('Erro: ' + e.message, 'error');
    }
  });
}

function resetForm() {
  document.getElementById('prodId').value = '';
  document.getElementById('prodNome').value = '';
  document.getElementById('prodPreco').value = '';
  document.getElementById('prodEstoque').value = 0;
  document.getElementById('prodCategoria').value = '';
  document.getElementById('modalProdutoTitle').textContent = 'Novo Produto';
}

init();
</script>
</body>
</html>
