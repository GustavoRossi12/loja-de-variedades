<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categorias | Loja de Variedades</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark"><img class="logo-img" src="imgs/logo.jpeg" alt="LojaVar" />LojaVariedade</div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="dashboard.html">Dashboard</a>
      <a class="nav-item" href="pdv.html">PDV — Caixa</a>
      <a class="nav-item" href="produtos.html">Produtos</a>
      <a class="nav-item active" href="categorias.html">Categorias</a>
      <a class="nav-item" href="clientes.html">Clientes</a>
      <a class="nav-item" href="vendas.html">Vendas</a>
      <a class="nav-item" href="estoque.html">Estoque Crítico</a>
    </nav>
  </aside>

  <main class="main">
    <header class="topbar">
      <span class="topbar-title">Categorias</span>
      <div class="topbar-spacer"></div>
      <span class="topbar-time" id="clock"></span>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div><h1>Categorias</h1>
          <p style="color:var(--text-muted);font-size:13px;margin-top:4px;">Organize seus produtos por categoria</p>
        </div>
        <button class="btn btn-primary" onclick="openModal('modalCategoria')">+ Nova Categoria</button>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>#</th><th>Nome</th><th>Descrição</th><th>Produtos</th><th>Ações</th></tr>
            </thead>
            <tbody id="categoriasTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast-container" id="toastContainer"></div>

<div class="modal-overlay" id="modalCategoria">
  <div class="modal maxw-460">
    <div class="modal-header">
      <span class="modal-title" id="modalCatTitle">Nova Categoria</span>
      <button class="modal-close" onclick="closeModal('modalCategoria')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="catId" />
      <div class="form-grid">
        <div class="form-group full">
          <label>Nome *</label>
          <input type="text" id="catNome" placeholder="Nome da categoria" />
        </div>
        <div class="form-group full">
          <label>Descrição</label>
          <textarea id="catDescricao" placeholder="Descrição da categoria..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modalCategoria');resetForm()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarCategoria()">Salvar</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
async function loadCategorias() {
  const tbody = document.getElementById('categoriasTable');
  loadingRows(tbody, 5);
  try {
    const cats = await api.get('categorias.php');
    if (cats.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="text-center p-40 text-sub">Nenhuma categoria</td></tr>';
      return;
    }
    tbody.innerHTML = cats.map(c => `
      <tr>
        <td class="mono">${c.id_categoria}</td>
        <td><strong>${c.nome}</strong></td>
        <td class="muted">${c.descricao || '—'}</td>
        <td><span class="badge badge-info">${c.total_produtos} produto(s)</span></td>
        <td>
          <div class="flex gap-6">
            <button class="btn btn-sm btn-outline" onclick='editCat(${JSON.stringify(JSON.stringify(c))})'>Editar</button>
            <button class="btn btn-sm btn-danger" onclick="removerCat(${c.id_categoria},'${c.nome.replace("'","")}')">Remover</button>
          </div>
        </td>
      </tr>`).join('');
  } catch (e) {
    toast('Erro ao carregar categorias', 'error');
  }
}

function editCat(cJson) {
  const c = JSON.parse(cJson);
  document.getElementById('catId').value = c.id_categoria;
  document.getElementById('catNome').value = c.nome;
  document.getElementById('catDescricao').value = c.descricao || '';
  document.getElementById('modalCatTitle').textContent = `Editar: ${c.nome}`;
  openModal('modalCategoria');
}

async function salvarCategoria() {
  const id = document.getElementById('catId').value;
  const data = {
    nome: document.getElementById('catNome').value,
    descricao: document.getElementById('catDescricao').value
  };
  if (!data.nome) { toast('Nome é obrigatório', 'warning'); return; }
  try {
    if (id) { await api.put(`categorias.php?id=${id}`, data); toast('Categoria atualizada!', 'success'); }
    else { await api.post('categorias.php', data); toast('Categoria criada!', 'success'); }
    closeModal('modalCategoria'); resetForm(); loadCategorias();
  } catch (e) { toast('Erro: ' + e.message, 'error'); }
}

async function removerCat(id, nome) {
  confirmDelete(`Remover categoria "${nome}"?`, async () => {
    try {
      await api.delete(`categorias.php?id=${id}`);
      toast('Categoria removida', 'success'); loadCategorias();
    } catch (e) { toast('Erro: ' + e.message, 'error'); }
  });
}

function resetForm() {
  document.getElementById('catId').value = '';
  document.getElementById('catNome').value = '';
  document.getElementById('catDescricao').value = '';
  document.getElementById('modalCatTitle').textContent = 'Nova Categoria';
}

loadCategorias();
</script>
</body>
</html>
